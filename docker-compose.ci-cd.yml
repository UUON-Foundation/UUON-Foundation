services:
  postgres:
    image: postgres:15-alpine
    container_name: uuon-postgres-ci
    environment:
      POSTGRES_USER: uuon_user
      POSTGRES_PASSWORD: uuon_password_dev
      POSTGRES_DB: uuon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uuon_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uuon-network

  redis:
    image: redis:7-alpine
    container_name: uuon-redis-ci
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uuon-network
    volumes:
      - redis_data:/data

  billing-api-dev:
    build:
      context: ./billing-system
      dockerfile: ../Dockerfile.billing
    container_name: uuon-billing-api-dev
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://uuon_user:uuon_password_dev@postgres:5432/uuon_db
      LOG_LEVEL: debug
    ports:
      - "5001:5001"
    volumes:
      - ./billing-system/server:/app/server
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uuon-network
    command: node server/index.js

  prometheus:
    image: prom/prometheus:latest
    container_name: uuon-prometheus-ci
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - uuon-network

  grafana:
    image: grafana/grafana:latest
    container_name: uuon-grafana-ci
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - uuon-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  uuon-network:
    driver: bridge
