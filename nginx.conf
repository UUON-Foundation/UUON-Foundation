events {
    worker_connections 1024;
}

http {
    upstream clouud_backend {
        # Primary for writes
        server primary:8080 max_fails=3 fail_timeout=30s;
        
        # Clones for reads (load balanced)
        server clone-1:8080 max_fails=3 fail_timeout=30s;
        server clone-2:8080 max_fails=3 fail_timeout=30s;
    }

    upstream clouud_read_only {
        # Clones only (read-only queries)
        server clone-1:8080;
        server clone-2:8080;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=credits_buy:10m rate=5r/h;

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Status/metrics (read-only)
        location /api/v1/status {
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
            access_log /var/log/nginx/status.log;
        }

        # Get endpoints (read-only)
        location ~ ^/api/v1/credits/balance {
            limit_req zone=general burst=20;
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/v1/transactions {
            limit_req zone=general burst=20;
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/v1/packages {
            limit_req zone=general burst=50;
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
        }

        location ~ ^/api/v1/users/.*$ {
            limit_req zone=general burst=10;
            if ($request_method = "GET") {
                proxy_pass http://clouud_read_only;
            }
            if ($request_method = "POST") {
                proxy_pass http://clouud_backend;
            }
            proxy_set_header Host $host;
        }

        # POST endpoints (write through primary)
        location ~ ^/api/v1/credits/buy {
            limit_req zone=credits_buy burst=1;
            proxy_pass http://primary:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
        }

        location ~ ^/api/v1/credits/transfer {
            limit_req zone=general burst=5;
            proxy_pass http://primary:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/v1/credits/use {
            limit_req zone=general burst=10;
            proxy_pass http://primary:8080;
            proxy_set_header Host $host;
        }

        # Proof endpoints (critical - route to primary)
        location ~ ^/api/v1/credits/proof {
            limit_req zone=general burst=5;
            proxy_pass http://primary:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        location ~ ^/api/v1/credits/verify {
            limit_req zone=general burst=20;
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
            proxy_read_timeout 5s;
        }

        # Analytics (read-only)
        location ~ ^/api/v1/analytics {
            limit_req zone=general burst=10;
            proxy_pass http://clouud_read_only;
            proxy_set_header Host $host;
        }

        # Default: route to backend with fallback
        location / {
            limit_req zone=general burst=10;
            proxy_pass http://clouud_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Failover
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 200 "{\"error\": \"Service temporarily unavailable\", \"retry_after\": 5}";
            add_header Content-Type application/json;
        }
    }
}
